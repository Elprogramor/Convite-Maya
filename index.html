<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convite | Maya 1 aninho</title>
    <meta
      name="description"
      content="Convite digital da Maya com tema jardim encantado, margaridas e flores."
    />
    <style>
      :root {
        --bg: #fceada;
        --surface: rgba(255, 252, 249, 0.9);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --line: rgba(235, 136, 177, 0.22);
        --text: #7e5b63;
        --pink-1: #f6b0c8;
        --pink-2: #eb88b1;
        --pink-3: #d96a98;
        --max: 460px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background: #fceada;
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(calc(100% - 18px), var(--max));
        margin: 12px auto 24px;
      }

      .invite {
        overflow: hidden;
        border-radius: 30px;
        box-shadow: 0 22px 48px rgba(190, 123, 151, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: #fceada;
      }

      .hero {
        width: 100%;
        background: #fceada;
      }

      .hero img {
        width: 100%;
        height: auto;
        display: block;
      }

      .content {
        position: relative;
        padding: 18px 14px 20px;
        background: #fceada;
      }

         .details {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  width: min(100%, 390px);
  margin: -180px auto 0;
  position: relative;
  z-index: 2;
}

      .detail-card {
        padding: 12px 10px;
        border-radius: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 26px rgba(208, 149, 171, 0.1);
        text-align: center;
      }

      .detail-label {
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--pink-2);
      }

      .detail-value {
        margin-top: 6px;
        font-size: 0.78rem;
        line-height: 1.45;
        font-weight: 700;
      }

      .actions {
        margin-top: 30px;
        display: grid;
        gap: 10px;
      }

      .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 14px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--pink-1), var(--pink-2), var(--pink-3));
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 14px 28px rgba(206, 117, 152, 0.2);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .action-btn:hover {
        transform: translateY(-2px);
      }

      .gift-title {
        margin-top: 20px;
        text-align: center;
        font-size: 1.38rem;
        font-weight: 700;
        color: var(--pink-2);
        text-shadow: 0 2px 10px rgba(255, 255, 255, 0.7);
      }

      .gift-grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .gift-card {
        overflow: hidden;
        border-radius: 22px;
        background: var(--surface-strong);
        border: 1px solid rgba(235, 136, 177, 0.22);
        box-shadow: 0 14px 28px rgba(198, 143, 166, 0.12);
        backdrop-filter: blur(10px);
      }

      .gift-card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }

      .gift-body {
        padding: 12px 12px 14px;
      }

      .gift-body h3 {
        margin: 0;
        text-align: center;
        font-size: 1.02rem;
        color: var(--pink-2);
      }

      .gift-tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin-top: 10px;
      }

      .gift-tag {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(235, 136, 177, 0.12);
        color: var(--pink-2);
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1.2;
      }

      .footer-image {
        width: 100%;
        background: #fceada;
      }

      .footer-image img {
        width: 100%;
        height: auto;
        display: block;
      }

      @media (max-width: 420px) {
        .page {
          width: min(calc(100% - 12px), var(--max));
          margin-top: 8px;
        }

        .invite {
          border-radius: 24px;
        }

        .content {
          padding: 14px 10px 16px;
        }

        .details {
          gap: 6px;
        }

        .detail-card {
          padding: 10px 8px;
          border-radius: 16px;
        }

        .detail-label {
          font-size: 0.68rem;
        }

        .detail-value {
          font-size: 0.72rem;
        }

        .actions {
          gap: 8px;
        }

        .action-btn {
          min-height: 46px;
          padding: 12px 14px;
          font-size: 0.92rem;
        }

        .gift-title {
          font-size: 1.22rem;
          margin-top: 16px;
        }

        .gift-grid {
          gap: 10px;
        }

        .gift-body {
          padding: 10px 10px 12px;
        }

        .gift-body h3 {
          font-size: 0.94rem;
        }

        .gift-tag {
          font-size: 0.64rem;
          padding: 6px 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="invite" aria-label="Convite da Maya">
        <div class="hero">
          <img src="./mayatopo.png" alt="Topo do convite da Maya" />
        </div>

        <div class="content">
          <div class="details">
            <div class="detail-card">
              <div class="detail-label">Data</div>
              <div class="detail-value">00 de mês<br />Domingo</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Horário</div>
              <div class="detail-value">00h00</div>
            </div>
            <div class="detail-card">
              <div class="detail-label">Local</div>
              <div class="detail-value">Nome do local</div>
            </div>
          </div>

          <div class="actions">
            <a class="action-btn" href="https://forms.gle/SEU-LINK-AQUI" target="_blank" rel="noreferrer">
              Confirmar presença
            </a>
            <a class="action-btn" href="#presentes">
              Sugestões de presente
            </a>
            <a class="action-btn" href="https://www.google.com/maps/place/Condom%C3%ADnio+Recanto+do+Bosque+2/@-22.5005264,-44.0644496,285m/data=!3m1!1e3!4m6!3m5!1s0x9ebd2c9dea34dd:0x94beb832c0e0da13!8m2!3d-22.5006584!4d-44.064659!16s%2Fg%2F11sr02_9zy?entry=ttu&g_ep=EgoyMDI2MDYwMy4xIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noreferrer">
              Ver localização
            </a>
          </div>

          <div class="gift-title" id="presentes">Sugestões de presente</div>

          <div class="gift-grid">
            <article class="gift-card">
              <img src="./assets/roupinhas-maya.png" alt="Sugestões de roupinhas" />
              <div class="gift-body">
                <h3>Roupinhas</h3>
                <div class="gift-tags">
                  <span class="gift-tag">0 a 24 meses</span>
                  <span class="gift-tag">Conforto</span>
                  <span class="gift-tag">Estilo</span>
                  <span class="gift-tag">Carinho</span>
                </div>
              </div>
            </article>

            <article class="gift-card">
              <img src="./assets/brinquedos-maya.png" alt="Sugestões de brinquedos" />
              <div class="gift-body">
                <h3>Brinquedos</h3>
                <div class="gift-tags">
                  <span class="gift-tag">Aprender</span>
                  <span class="gift-tag">Brincar</span>
                  <span class="gift-tag">Imaginar</span>
                  <span class="gift-tag">Crescer</span>
                </div>
              </div>
            </article>
          </div>
        </div>

        <div class="footer-image">
          <img src="./mayarodape.png" alt="Rodapé do convite da Maya" />
        </div>
      </section>
    </main>
  </body>
</html>
