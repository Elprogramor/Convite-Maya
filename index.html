<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convite | Maya 1 aninho</title>
    <meta
      name="description"
      content="Convite digital da Maya com tema jardim encantado, margaridas e flores."
    />
    <style>
      :root {
        --bg: #fff8f7;
        --surface: rgba(255, 252, 249, 0.88);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --line: rgba(235, 136, 177, 0.24);
        --text: #7e5b63;
        --text-soft: #a67984;
        --pink-1: #f6b0c8;
        --pink-2: #eb88b1;
        --pink-3: #d96a98;
        --shadow: 0 18px 40px rgba(182, 104, 136, 0.2);
        --radius-xl: 26px;
        --radius-lg: 22px;
        --radius-md: 18px;
        --max: 460px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(246, 176, 200, 0.28), transparent 30%),
          radial-gradient(circle at top right, rgba(255, 227, 236, 0.9), transparent 24%),
          linear-gradient(180deg, #fffdfc 0%, #fff8f7 100%);
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(calc(100% - 18px), var(--max));
        margin: 12px auto 24px;
      }

      .invite {
        position: relative;
        width: 100%;
        aspect-ratio: 941 / 1672;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04)),
          url("<img width="941" height="1672" alt="Image" src="maya fundo.png" />") center top / cover no-repeat;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 22px 48px rgba(190, 123, 151, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.72);
      }

      .details {
        position: absolute;
        left: 50%;
        top: 44.3%;
        transform: translateX(-50%);
        width: min(calc(100% - 26px), 392px);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .detail-card {
        padding: 12px 10px;
        border-radius: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 26px rgba(208, 149, 171, 0.12);
        text-align: center;
      }

      .detail-label {
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--pink-2);
      }

      .detail-value {
        margin-top: 6px;
        font-size: 0.78rem;
        line-height: 1.45;
        font-weight: 700;
      }

      .actions {
        position: absolute;
        left: 50%;
        top: 56.5%;
        transform: translateX(-50%);
        width: min(calc(100% - 34px), 368px);
        display: grid;
        gap: 10px;
      }

      .action-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 14px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--pink-1), var(--pink-2), var(--pink-3));
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 14px 28px rgba(206, 117, 152, 0.22);
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .action-btn:hover {
        transform: translateY(-2px);
      }

      .gift-title {
        position: absolute;
        left: 50%;
        top: 70.6%;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        text-align: center;
        font-size: 1.38rem;
        font-weight: 700;
        color: var(--pink-2);
        text-shadow: 0 2px 10px rgba(255, 255, 255, 0.7);
      }

      .gift-grid {
        position: absolute;
        left: 50%;
        top: 74.5%;
        transform: translateX(-50%);
        width: min(calc(100% - 30px), 386px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .gift-card {
        overflow: hidden;
        border-radius: 22px;
        background: var(--surface-strong);
        border: 1px solid rgba(235, 136, 177, 0.22);
        box-shadow: 0 14px 28px rgba(198, 143, 166, 0.14);
        backdrop-filter: blur(10px);
      }

      .gift-card img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
      }

      .gift-body {
        padding: 12px 12px 14px;
      }

      .gift-body h3 {
        margin: 0;
        text-align: center;
        font-size: 1.02rem;
        color: var(--pink-2);
      }

      .gift-tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
        margin-top: 10px;
      }

      .gift-tag {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(235, 136, 177, 0.12);
        color: var(--pink-2);
        font-size: 0.7rem;
        font-weight: 700;
        line-height: 1.2;
      }

      @media (max-width: 420px) {
        .page {
          width: min(calc(100% - 12px), var(--max));
          margin-top: 8px;
        }

        .invite {
          border-radius: 24px;
        }

        .details {
          width: min(calc(100% - 20px), 374px);
          gap: 6px;
          top: 44.8%;
        }

        .detail-card {
          padding: 10px 8px;
          border-radius: 16px;
        }

        .detail-label {
          font-size: 0.68rem;
        }

        .detail-value {
          font-size: 0.72rem;
        }

        .actions {
          width: min(calc(100% - 24px), 356px);
          top: 57.2%;
          gap: 8px;
        }

        .action-btn {
          min-height: 46px;
          padding: 12px 14px;
          font-size: 0.92rem;
        }

        .gift-title {
          top: 70.9%;
          font-size: 1.22rem;
        }

        .gift-grid {
          width: min(calc(100% - 20px), 372px);
          top: 74.8%;
          gap: 10px;
        }

        .gift-body {
          padding: 10px 10px 12px;
        }

        .gift-body h3 {
          font-size: 0.94rem;
        }

        .gift-tag {
          font-size: 0.64rem;
          padding: 6px 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="invite" aria-label="Convite da Maya">
        <div class="details">
          <div class="detail-card">
            <div class="detail-label">Data</div>
            <div class="detail-value">00 de mês<br />Domingo</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Horário</div>
            <div class="detail-value">00h00</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Local</div>
            <div class="detail-value">Nome do local</div>
          </div>
        </div>

        <div class="actions">
          <a class="action-btn" href="https://forms.gle/SEU-LINK-AQUI" target="_blank" rel="noreferrer">
            Confirmar presença
          </a>
          <a class="action-btn" href="#presentes">
            Sugestões de presente
          </a>
          <a class="action-btn" href="https://maps.app.goo.gl/SEU-LINK-AQUI" target="_blank" rel="noreferrer">
            Ver localização
          </a>
        </div>

        <div class="gift-title" id="presentes">Sugestões de presente</div>

        <div class="gift-grid">
          <article class="gift-card">
            <img src="./assets/roupinhas-maya.png" alt="Sugestões de roupinhas" />
            <div class="gift-body">
              <h3>Roupinhas</h3>
              <div class="gift-tags">
                <span class="gift-tag">0 a 24 meses</span>
                <span class="gift-tag">Conforto</span>
                <span class="gift-tag">Estilo</span>
                <span class="gift-tag">Carinho</span>
              </div>
            </div>
          </article>

          <article class="gift-card">
            <img src="./assets/brinquedos-maya.png" alt="Sugestões de brinquedos" />
            <div class="gift-body">
              <h3>Brinquedos</h3>
              <div class="gift-tags">
                <span class="gift-tag">Aprender</span>
                <span class="gift-tag">Brincar</span>
                <span class="gift-tag">Imaginar</span>
                <span class="gift-tag">Crescer</span>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
